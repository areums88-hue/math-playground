<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>수학 게임 놀이터</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f7fb;
    padding: 25px 20px 20px;
    margin: 0;
}

h1 {
    color: #333;
    font-size: 32px;
    margin: 0 0 10px 0;
}

.subtitle {
    color: #666;
    margin-bottom: 25px;
}

.games {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 280px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    box-sizing: border-box;
}

.card h2 {
    margin-top: 0;
}

.card p {
    color: #666;
}

button {
    background: #4a90e2;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: #357abd;
}

a {
    text-decoration: none;
}

.prototype-footer {
    margin-top: 35px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 12px;
    color: #999;
    line-height: 1.6;
}

.prototype-footer .version {
    font-weight: bold;
    color: #777;
}

.prototype-footer .divider {
    color: #bbb;
}

@media (max-width: 768px) {

    body {
        padding: 25px 16px 18px;
    }

    h1 {
        font-size: 28px;
    }

    .subtitle {
        margin-bottom: 20px;
    }

    .games {
        gap: 18px;
    }

    .card {
        width: 100%;
        max-width: 320px;
    }

    .prototype-footer {
        font-size: 11px;
        line-height: 1.5;
    }
}

</style>

</head>

<body>

<h1>🛝 초등 수학 놀이터</h1>

<p class="subtitle">
재미있게 풀고,<br>
자연스럽게 익히는 수학 연습
</p>

<div class="games">

<div class="card">
<h2>➕ 연산 마스터</h2>
<p>빠르고 정확한 계산 능력 기르기</p>

<a href="https://areums88-hue.github.io/yeonsan-master/">
<button>시작하기</button>
</a>
</div>


<div class="card">
<h2>📐 도형 마스터</h2>
<p>도형 감각과 공간 감각 기르기</p>

<a href="https://areums88-hue.github.io/dohyeong-master/">
<button>시작하기</button>
</a>
</div>


<div class="card">
<h2>🕘 시간 마스터</h2>
<p>시각 표현과 시간 감각 기르기</p>

<a href="https://areums88-hue.github.io/sigan-master/">
<button>시작하기</button>
</a>
</div>

</div>


<footer class="prototype-footer">
    <span class="version">Prototype v0.1</span>
    <span class="divider"> | </span>
    <span>기획 및 프로토타입 제작: 아름 손</span>
</footer>

</body>
</html>
