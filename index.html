<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>수학 게임 놀이터</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f7fb;
    padding: 25px 20px;   /* 40px → 25px */
    margin: 0;
}

h1 {
    color: #333;
    font-size: 32px;
    margin-bottom: 10px;
}

.subtitle {
    color: #666;
    margin-bottom: 30px;  /* 40px → 30px */
}

.card {
    background: white;
    width: 280px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card h2 {
    margin-top: 0;
}

.card p {
    color: #666;
}

button {
    background: #4a90e2;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #357abd;
}

a {
    text-decoration: none;
}

.prototype-footer {
    margin-top: 35px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 12px;
    color: #999;
}
</style>

</head>
